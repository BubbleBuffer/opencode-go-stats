name: Release

on:
  release:
    types: [published]

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - run: cd dist/extension && zip -r ../../extension.zip manifest.json content.js
      - run: gh release upload ${{ github.event.release.tag_name }} extension.zip dist/opencode-stats.user.js dist/pull-stats.js
        env:
          GH_TOKEN: ${{ github.token }}
